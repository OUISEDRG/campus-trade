
server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    url: jdbc:mysql://localhost:3306/campus_trade?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 🌟 设置单个文件的最大限制（比如改成 10MB）
  servlet:
    multipart:
      max-file-size: 10MB
      # 🌟 设置单次请求的总文件大小限制
      max-request-size: 10MB
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  cache:
    type: none  # Redis 未安装时设为 none，生产环境改为 redis

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

app:
  admin-invite-code: ${ADMIN_INVITE_CODE:CampusTrade@Admin2026}

wechat:
  appid: ${WECHAT_APPID:wx1234567890abcdef}
  secret: ${WECHAT_SECRET:secret1234567890abcdef1234567890abcdef}
  redirect-uri: ${WECHAT_REDIRECT_URI:http://localhost:8080/wechat/callback}
